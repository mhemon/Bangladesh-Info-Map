<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Bangladesh Info Map</title>
  <desc id="desc">Interactive Bangladesh district and division statistics map.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b6e4f"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g fill="#ffffff" font-family="Segoe UI, Arial, sans-serif">
    <text x="80" y="230" font-size="62" font-weight="700">Bangladesh Info Map</text>
    <text x="80" y="300" font-size="32" opacity="0.95">Interactive map with district and division insights</text>
    <text x="80" y="350" font-size="28" opacity="0.9">Census + live data enriched visualization</text>
    <text x="80" y="540" font-size="24" opacity="0.85">bangladesh-info-map.vercel.app</text>
  </g>
</svg>
